name: Build Call Recorder APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: "35.0.0"
          packages: "platforms;android-35"

      - name: Fetch Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1 --no-daemon
          chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > ciphervault-release-keystore.jks

      - name: Build
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        timeout-minutes: 30

      - name: Collect APK
        run: mkdir -p apk && cp app/build/outputs/apk/release/app-release.apk apk/Call-Recorder.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Call-Recorder
          path: apk/Call-Recorder.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4
          name: Call Recorder v1.0.4
          files: apk/Call-Recorder.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
