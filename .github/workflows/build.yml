name: Build Call Recorder APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: "35.0.0"
          packages: "platforms;android-35"

      - name: Setup Gradle Wrapper
        run: |
          GRADLE_VER="8.11.1"
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-${GRADLE_VER}/bin/gradle wrapper --gradle-version ${GRADLE_VER} --no-daemon
          chmod +x gradlew

      - name: Checkout Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > ciphervault-release-keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        timeout-minutes: 30

      - name: Copy APK
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/release/app-release.apk apk/Call-Recorder.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Call-Recorder
          path: apk/Call-Recorder.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.2
          name: "Call Recorder v1.0.2"
          body: |
            ## Call Recorder v1.0.2

            Dual source recording (mic + speaker) with per-source volume controls.
            Output formats: WAV, FLAC, MP3, AAC, OGG/Vorbis.
            Contact filtering, auto-start on boot, dark theme.

            APK: Call-Recorder.apk
          files: apk/Call-Recorder.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
